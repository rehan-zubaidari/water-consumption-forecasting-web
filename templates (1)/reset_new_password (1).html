<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset New Password</title>

  <!-- Import Font Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Import CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_login.css') }}">
</head>
<body>
<div class="reset-new-password-page">
  <div class="left-section">
    <div class="left-top">
      <h1 class="title">
        <span>Welcome to</span><br />
        <span class="bold">Access Clean Water Forecasts</span><br />
        <span>at</span> <span class="bold">PERUMDA</span> <span>Air Minum</span><br />
        <span class="bold">TIRTA TAMIANG</span><br />
        <span>in</span> <span class="bold">KARANG BARU</span><br />
      </h1>
    </div>
    <div class="left-image">
      <img src="{{ url_for('static', filename='img/tampilan_reset_new_password.svg') }}" alt="Reset New Password Illustration" />
    </div>
  </div>

  <div class="right-section">
          {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flash-messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
        
             <h1 class="reset-password-instruction">
            <span class="bold">Please reset your password</span><br />
            </h1>
    <form action="{{ url_for('reset_password_token', token=token) }}" method="post" class="form-container">
      <div class="form-field">
        <img src="{{ url_for('static', filename='img/icon_password.svg') }}" alt="Password Icon" />
           <input type="password" name="new_password" placeholder="Enter your new password" required autocomplete="new-password" />
      </div>
        <div class="form-field">
    <img src="{{ url_for('static', filename='img/icon_password.svg') }}" alt="Repeat Password Icon" />
    <input type="password" name="confirm_password" placeholder="Repeat your new password" required />
  </div>
      <button type="submit" class="submit-button">Submit</button>
    </form>
  </div>
</div>
</body>
</html>
